<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 max-w-sm mx-auto">

    <h2 class="text-xl font-bold">LOGIN</h2>

    <input type="email" placeholder="Email" formControlName="email" class="p-2 border border-gray-500" />

    <div *ngIf="(loginForm.get('email')?.touched || submitted) && loginForm.get('email')?.invalid">
        <small>Email inválido</small>
    </div>

    <input type="password" placeholder="Contraseña" formControlName="password" class="p-2 border border-gray-500" />

    <div *ngIf="(loginForm.get('password')?.touched || submitted) && loginForm.get('password')?.invalid">
        <small class="text-red-500">Mínimo 6 caracteres</small>
    </div>

    <button type="submit" class="bg-red-500 text-white py-2">
        Iniciar sesión
    </button>

</form>
