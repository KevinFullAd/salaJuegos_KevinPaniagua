<form
  [formGroup]="loginForm"
  (ngSubmit)="onSubmit()"
  class="page page-narrow page-center login-container flex flex-col gap-5">

  <div class="mb-2">
    <h1 class="title">LOGIN</h1>
    <p class="subtitle">ACCEDE A TU CUENTA</p>
  </div>

  <!-- EMAIL -->
  <div class="field">
    <app-card
      [bordered]="true"
      corners="TL BR"
      [cut]="12"
      [styles]="fieldCardStyles"
      borderColor="var(--border-color-soft)">
        <input
          type="email"
          placeholder="usuario@ejemplo.com"
          formControlName="email"
          class="input input-card"
        />
    </app-card>

    <small *ngIf="(loginForm.get('email')?.touched || submitted()) && loginForm.get('email')?.invalid">
      Email inválido
    </small>
  </div>

  <!-- PASSWORD -->
  <div class="field">
    <app-card
      [bordered]="true"
      corners="TL BR"
      [cut]="12"
      [styles]="fieldCardStyles"
      borderColor="var(--border-color-soft)">
      <div class="password-field">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="••••••••"
          formControlName="password"
          class="input input-card password-input"
        />

        <button
          type="button"
          class="password-toggle"
          [disabled]="isSubmitting()"
          [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          [attr.aria-pressed]="showPassword()"
          (click)="togglePasswordVisibility()">
          <lucide-icon
            [img]="showPassword() ? eyeOffIcon : eyeIcon"
            [size]="18"
            color="currentColor">
          </lucide-icon>
        </button>
      </div>
    </app-card>

    <small *ngIf="(loginForm.get('password')?.touched || submitted()) && loginForm.get('password')?.invalid">
      Mínimo 6 caracteres
    </small>
  </div>

  <!-- OPTIONS -->
  <div class="options">
    <label>
      <input type="checkbox" />
      Recordarme
    </label>

    <a class="link">¿Olvidó su contraseña?</a>
  </div>

  <section class="quick-login" aria-label="Accesos rapidos">
    <p>Acceso rapido</p>
    <div class="quick-login-grid">
      <button
        *ngFor="let user of quickAccessUsers"
        type="button"
        class="quick-login-button"
        [disabled]="isSubmitting()"
        (click)="fillQuickAccess(user)">
        {{ user.label }}
      </button>
    </div>
  </section>

  <!-- LOGIN BUTTON -->
  <app-cyber-button
    [label]="isSubmitting() ? 'INICIANDO...' : 'INICIAR SESIÓN'"
    [icon]="isSubmitting() ? 'loader-circle' : 'log-in'"
    type="submit"
    variant="solid"
    [disabled]="isSubmitting()"
    [customClass]="isSubmitting() ? 'login-submit-button is-loading' : 'login-submit-button'"
    [glow]="true"
    corners="TL BR"
    [hoverGlow]="true"
    [hoverScale]="true"
    color="var(--color-accent)"
    class="w-full"
  ></app-cyber-button>

  <!-- REGISTER -->
  <div class="register-container">
    ¿No tienes cuenta?
    <a routerLink="/register" class="link">Registrate</a>
  </div>

</form>
