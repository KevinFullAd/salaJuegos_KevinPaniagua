<div class="min-h-screen bg-black text-white p-8">

            AGON
        </h1>
        <p class="text-zinc-400">Digital Arena</p>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Sin borde -->
<app-card class="" corners="TR BL"  [bordered]="true">
  <span>🧠</span>

<!-- Con borde verde -->

</app-card>

    </div>
