<section class="game-shell">
  <div class="game-header">
    <div>
      <p class="eyebrow">Pasapalabra</p>
      <h2>Resuelve las 26 preguntas</h2>
    </div>
    <button type="button" class="secondary-button" (click)="newGame()">Reiniciar</button>
  </div>

  <div class="rosco">
    <div
      *ngFor="let item of letters; let i = index"
      class="rosco-letter"
      [class.state-0]="item.state === 0"
      [class.state-1]="item.state === 1"
      [class.state-2]="item.state === 2"
      [class.state-3]="item.state === 3"
      [style.--angle]="(i * 360 / letters.length) + 'deg'">
      <span>{{ item.letter }}</span>
    </div>
  </div>

  <div class="question-panel">
    <div class="question-controls">
      <span class="question-label">Letra actual</span>
      <strong>{{ currentLetter }}</strong>
      <span class="question-progress">Pregunta {{ currentIndex + 1 }} / {{ letters.length }}</span>
    </div>

    <p class="question-text">{{ currentQuestion.ask }}</p>

    <div class="answer-row">
      <input
        type="text"
        [(ngModel)]="answer"
        placeholder="Escribe tu respuesta"
        [disabled]="finished"
        aria-label="Respuesta" />
      <button type="button" class="primary-button" [disabled]="finished" (click)="response()">Responder</button>
    </div>

    <div class="action-row">
      <button type="button" class="secondary-button" [disabled]="finished" (click)="pasapalabra()">Pasapalabra</button>
      <button type="button" class="secondary-button" [disabled]="finished" (click)="deleteChar()">Borrar</button>
    </div>

    <div class="game-summary">
      <span>Puntos: {{ score }}</span>
      <span *ngIf="finished">Juego terminado.</span>
    </div>
  </div>
</section>
