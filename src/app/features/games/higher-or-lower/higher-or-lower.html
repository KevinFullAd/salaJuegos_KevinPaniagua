<section class="game-shell">
  <div class="game-header">
    <div>
      <p class="eyebrow">Mayor o Menor</p>
      <h2>Elige la siguiente carta</h2>
    </div>
    <button type="button" class="secondary-button" (click)="newGame()">Reiniciar</button>
  </div>

  <div class="card-display">
    <img class="game-illustration" src="/assets/higher-or-lower.png" alt="Mayor o Menor" loading="lazy" decoding="async" />
    <div class="playing-card">
      <span class="card-rank">{{ currentCard.rank }}</span>
      <span class="card-suit">{{ currentCard.suit }}</span>
    </div>
    <p class="instructions">La proxima carta sera mayor o menor?</p>
  </div>

  <div class="buttons-row">
    <button class="action-button" type="button" [disabled]="finished" (click)="chooseHigher()">Mayor</button>
    <button class="action-button" type="button" [disabled]="finished" (click)="chooseLower()">Menor</button>
  </div>

  <div class="game-footer">
    <span>Puntos: {{ score }}</span>
    <span>Cartas: {{ progressText }}</span>
    <span>{{ message }}</span>
  </div>
</section>
